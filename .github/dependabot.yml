version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /src/crates/netipc
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /src/go
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      go-sdk-dependencies:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /tests/fixtures/go
    schedule:
      interval: weekly
      day: monday
      time: "05:45"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      go-fixture-dependencies:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /bench/drivers/go
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      go-benchmark-dependencies:
        patterns:
          - "*"
