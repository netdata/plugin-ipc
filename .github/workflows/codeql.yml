name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 03 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.name }}
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: C/C++
            language: c-cpp
            build_command: |
              cmake -S . -B build-codeql -DCMAKE_BUILD_TYPE=Debug
              cmake --build build-codeql --parallel
          - name: Go
            language: go
            build_command: |
              for module in src/go tests/fixtures/go bench/drivers/go; do
                (cd "$module" && go test ./...)
              done
          - name: Rust
            language: rust
            build_command: |
              cargo test --manifest-path src/crates/netipc/Cargo.toml --all-targets --all-features --no-run

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/go/go.mod
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: manual
          config-file: ./.github/codeql.yml

      - name: Build for CodeQL
        run: ${{ matrix.build_command }}

      - name: Analyze
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: /language:${{ matrix.language }}
